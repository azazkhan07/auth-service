spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
server:
  port: 8082

jwt:
  access:
    expiration: 86400000

  refresh:
    expiration: 604800000

  secret: bXlzZWNyZXRrZXlteXNlY3JldGtleW15c2VjcmV0a2V5MTIzNDU2

eureka:
    instance:
      prefer-ip-address: true

    client:
      service-url:
        defaultZone: http://localhost:8761/eureka